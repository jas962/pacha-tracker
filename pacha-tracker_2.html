.syncArea{background:var(--b2);border:1px solid var(--bd);border-radius:10px;padding:12px;margin-top:10px}

function mkDef(){const an={};AD.forEach(a=>{const i=INIT[a.s],c={},at={};a.c.forEach(cl=>{c[cl.n]=i?.c[cl.n]??0;at[cl.n]=0});an[a.s]={tt:i?.tt??0,c,at}});const ev={};EVA.forEach(e=>{ev[e.s]={u:false,n:0}});return{season:0,day:1,an,ev,sheds:12,tab:"tracker",exp:null}}
let S;try{const raw=localStorage.getItem(SK);S=raw?JSON.parse(raw):mkDef();AD.forEach(a=>{if(!S.an[a.s])S.an[a.s]=mkDef().an[a.s];if(!S.an[a.s].at)S.an[a.s].at={};a.c.forEach(cl=>{if(S.an[a.s].c[cl.n]===undefined)S.an[a.s].c[cl.n]=0;if(S.an[a.s].at[cl.n]===undefined)S.an[a.s].at[cl.n]=0;if(S.an[a.s].tt===undefined)S.an[a.s].tt=0})});if(!S.ev)S.ev=mkDef().ev;EVA.forEach(e=>{if(!S.ev[e.s])S.ev[e.s]={u:false,n:0}});if(!S.sheds)S.sheds=12}catch(e){S=mkDef()}
function save(){localStorage.setItem(SK,JSON.stringify(S))}
function daysUntil(sd,ss,cs,cd){if(!ss.includes(cs))return-1;let b=999;for(const d of sd){const df=d-cd;if(df>=0&&df<b)b=df}return b>28?-1:b}
function spawnLabel(sp){return sp.ss.map(i=>SEASONS[i]).join("/")+"\u00a0D"+sp.d.join(",")}

// SVG Pie chart generator
function makePie(data,size,hole){
  if(!data.length||data.every(d=>d.v===0))return`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><circle cx="${size/2}" cy="${size/2}" r="${size/2-2}" fill="none" stroke="#3e3830" stroke-width="2"/><text x="${size/2}" y="${size/2+4}" text-anchor="middle" fill="#7a6e5e" font-size="11" font-family="DM Sans">No data</text></svg>`;
  const total=data.reduce((s,d)=>s+d.v,0);const cx=size/2,cy=size/2,r=size/2-2,ir=hole||0;
  let ang=-Math.PI/2,paths="";
  data.forEach((d,i)=>{if(d.v===0)return;const slice=d.v/total*Math.PI*2;const x1=cx+r*Math.cos(ang),y1=cy+r*Math.sin(ang);const x2=cx+r*Math.cos(ang+slice),y2=cy+r*Math.sin(ang+slice);
    const ix1=cx+ir*Math.cos(ang),iy1=cy+ir*Math.sin(ang);const ix2=cx+ir*Math.cos(ang+slice),iy2=cy+ir*Math.sin(ang+slice);
    const lg=slice>Math.PI?1:0;
    if(ir>0){paths+=`<path d="M${ix1},${iy1} L${x1},${y1} A${r},${r} 0 ${lg} 1 ${x2},${y2} L${ix2},${iy2} A${ir},${ir} 0 ${lg} 0 ${ix1},${iy1}" fill="${d.c}" stroke="${"#161210"}" stroke-width="1.5"/>`}
    else{paths+=`<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${lg} 1 ${x2},${y2} Z" fill="${d.c}" stroke="${"#161210"}" stroke-width="1.5"/>`}
    ang+=slice;
  });
  return`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${paths}</svg>`;
}

function showSpeciesPie(idx){
  const a=AD[idx],sa=S.an[a.s];
  const data=a.c.filter(c=>sa.c[c.n]>0).map(c=>({v:sa.c[c.n],c:COLORS_MAP[c.n]||"#888",n:c.n,q:sa.c[c.n]}));
  let h=`<div class="modalInner"><button class="modalClose" onclick="document.getElementById('modal').innerHTML=''">✕</button>`;
  h+=`<div class="modalTitle">${a.e} ${a.s}</div>`;
  h+=`<div class="pieWrap">${makePie(data,180,45)}`;
  h+=`<div class="pieLegend">${data.map(d=>`<span class="pieLI"><span class="dot" style="background:${d.c}"></span>${d.n}: ${d.q}</span>`).join("")}</div></div>`;
  const missing=a.c.filter(c=>sa.c[c.n]===0);
  if(missing.length){h+=`<div class="secLbl" style="margin-top:12px">Missing <span class="ln"></span></div>`;
    h+=missing.map(c=>`<div style="display:flex;align-items:center;gap:6px;padding:3px 0;font-size:.75rem;color:var(--t3)"><span class="csw" style="background:${COLORS_MAP[c.n]||"#888"}"></span>${c.n}${c.t==="r"?' <span class="ctR">R</span>':""}${c.t==="l"?' <span class="ctL">L</span>':""}</div>`).join("")}
  h+=`</div>`;
  document.getElementById("modal").innerHTML=`<div class="modal" onclick="if(event.target===this)this.innerHTML=''">${h}</div>`;
}

function render(){
  let totF=0,totC=0,totP=0,spD=0;const farmBySpecies=[];
  AD.forEach((a,i)=>{const sa=S.an[a.s];const fc=Object.values(sa.c).reduce((x,v)=>x+v,0);totF+=fc;farmBySpecies.push({n:a.s,v:fc,c:PIE_COLS[i],e:a.e,i});const cc=a.c.filter(c=>sa.c[c.n]>0).length;totC+=cc;totP+=a.c.length;if(cc===a.c.length)spD++});
  totF+=EVA.reduce((x,e)=>x+(S.ev[e.s]?.n||0),0);
  const mx=S.sheds*SPS,capP=Math.min(100,Math.round(totF/mx*100)),oP=totP?Math.round(totC/totP*100):0;
  const spawns=[],countdowns=[];
  AD.forEach(a=>{const sa=S.an[a.s],rOk=sa.tt>=8,lOk=sa.tt>=12;
    a.c.forEach(c=>{if(!c.sp)return;if((c.t==="r"&&!rOk)||(c.t==="l"&&!lOk))return;if(sa.c[c.n]>0)return;
      const du=daysUntil(c.sp.d,c.sp.ss,S.season,S.day);
      if(du===0)spawns.push({sp:a.s,em:a.e,cn:c.n,t:c.t});
      else if(du>0&&du<=3)countdowns.push({sp:a.s,em:a.e,cn:c.n,t:c.t,d:du});
    });
  });

  let h=`<div class="hdr"><h1>🌿 Roots of Pacha</h1><p>Animal Tracker</p></div>`;
  h+=`<div class="topbar"><div class="tg"><label>Season</label><select class="tsel" onchange="S.season=+this.value;save();render()">${SEASONS.map((n,i)=>`<option value="${i}"${S.season===i?" selected":""}>${n}</option>`).join("")}</select></div>`;
  h+=`<div class="tg"><label>Day</label><input class="tinp" type="number" min="1" max="28" value="${S.day}" onchange="S.day=Math.min(28,Math.max(1,+this.value||1));save();render()"></div>`;
  h+=`<div class="tg"><label>Sheds</label><div class="qc"><button class="qb${S.sheds<=1?" off":""}" onclick="if(S.sheds>1){S.sheds--;save();render()}">−</button><div class="qv">${S.sheds}</div><button class="qb${S.sheds>=MAX_SHEDS?" off":""}" onclick="if(S.sheds<${MAX_SHEDS}){S.sheds++;save();render()}">+</button></div></div>`;
  h+=`<div class="cap"><b>${totF}</b>/${mx}<div class="capBar"><div class="capFill" style="width:${capP}%;background:${capP>90?"var(--rd)":capP>70?"var(--l)":"var(--g)"}"></div></div></div></div>`;
  spawns.forEach(a=>{h+=`<div class="alertBox alertSpawn">🌟 <strong>${a.em} ${a.sp} — ${a.cn}</strong> available today! (${a.t==="l"?"Legendary":"Rare"})</div>`});
  countdowns.forEach(a=>{h+=`<div class="alertBox alertCount">⏳ <strong>${a.em} ${a.sp} — ${a.cn}</strong> in <strong>${a.d} day${a.d>1?"s":""}</strong> (${a.t==="l"?"Legendary":"Rare"})</div>`});
  h+=`<div class="tabs">${[["tracker","Animals"],["evolved","Evolved"],["charts","Charts"],["summary","Summary"]].map(([k,l])=>`<button class="tab${S.tab===k?" on":""}" onclick="S.tab='${k}';save();render()">${l}</button>`).join("")}</div>`;

  if(S.tab==="tracker"){
    AD.forEach(a=>{
      const sa=S.an[a.s],fc=Object.values(sa.c).reduce((x,v)=>x+v,0),cc=a.c.filter(c=>sa.c[c.n]>0).length,tt=a.c.length,pc=Math.round(cc/tt*100),rOk=sa.tt>=8,lOk=sa.tt>=12,dn=cc===tt,ex=S.exp===a.s;
      h+=`<div class="scard${dn?" done":""}"><div class="shdr" onclick="S.exp=S.exp==='${a.s}'?null:'${a.s}';save();render()">`;
      h+=`<span class="semoji">${a.e}</span><div class="sinfo"><div class="sname">${a.s}</div><div class="smeta"><span>${fc} on farm</span><span>·</span><span>${sa.tt} tamed</span>${a.ev?`<span>·</span><span>→ ${a.ev}`:""}</span></div></div>`;
      h+=`<div class="badges">${dn?'<span class="bdg bdg-ok">✓</span>':""}${rOk?'<span class="bdg bdg-r">R</span>':'<span class="bdg bdg-x">R🔒</span>'}${lOk?'<span class="bdg bdg-l">L</span>':'<span class="bdg bdg-x">L🔒</span>'}</div>`;
      h+=`<div class="pbar"><div class="pbBg"><div class="pbFill" style="width:${pc}%;background:${dn?"var(--g)":"var(--ac)"}"></div></div><span class="pbPct">${pc}%</span></div>`;
      h+=`<span class="chev${ex?" open":""}">▶</span></div>`;
      if(ex){
        h+=`<div class="detail show">`;const esc=a.s.replace(/'/g,"\\'");
        h+=`<div class="ttRow"><span class="ttLbl">Total Tamed (for R/L unlock)</span><div class="qc"><button class="qb${sa.tt<=0?" off":""}" onclick="if(S.an['${esc}'].tt>0){S.an['${esc}'].tt--;save();render()}">−</button><div class="qv" style="width:34px">${sa.tt}</div><button class="qb" onclick="S.an['${esc}'].tt++;save();render()">+</button></div></div>`;
        h+=`<div class="dstats"><div class="dstat"><div class="dv">${fc}</div><div class="dl">On Farm</div></div><div class="dstat"><div class="dv">${cc}/${tt}</div><div class="dl">Colors</div></div><div class="dstat"><div class="dv" style="color:${rOk?"var(--r)":"var(--t3)"}">${rOk?"✓":sa.tt+"/8"}</div><div class="dl">Rare</div></div><div class="dstat"><div class="dv" style="color:${lOk?"var(--l)":"var(--t3)"}">${lOk?"✓":sa.tt+"/12"}</div><div class="dl">Leg.</div></div></div>`;
        [["n","Common / Uncommon",false],["r","Rare",!rOk],["l","Legendary",!lOk]].forEach(([type,label,locked])=>{
          const cols=a.c.filter(c=>c.t===type);if(!cols.length)return;
          h+=`<div class="secLbl">${label}${locked?` <span style="color:var(--t3);font-weight:400;font-size:.55rem">(${type==="r"?"8":"12"}+ tamed)</span>`:""}<span class="ln"></span></div>`;
          cols.forEach(c=>{
            const q=sa.c[c.n]||0,at=sa.at[c.n]||0,cesc=c.n.replace(/'/g,"\\'"),clr=COLORS_MAP[c.n]||"#888";
            const cls=type==="r"?(q>0?"crow rr":"crow"):type==="l"?(q>0?"crow lr":"crow"):q>0?"crow has":"crow";
            h+=`<div class="${cls}${locked?" lk":""}"><span class="csw" style="background:${clr}"></span><span class="cn">${c.n}${type==="r"?'<span class="ctR">R</span>':""}${type==="l"?'<span class="ctL">L</span>':""}${c.sp?`<span class="spI">${spawnLabel(c.sp)}</span>`:""}</span>`;
            if(q===0&&!locked){
              h+=`<div class="attSec"><span class="attLbl">♪</span>`;
              for(let i=0;i<a.ad;i++){h+=`<button class="attDot${i<at?" on":""}" onclick="(function(){var a=S.an['${esc}'].at['${cesc}']||0,nA=${i}<a?${i}:${i+1};if(nA>=${a.ad}){S.an['${esc}'].at['${cesc}']=0;S.an['${esc}'].c['${cesc}']++;S.an['${esc}'].tt++}else{S.an['${esc}'].at['${cesc}']=nA}save();render()})()"></button>`}
              h+=`</div>`;
            }
            h+=`<div class="qc"><button class="qb${q<=0?" off":""}" onclick="if(S.an['${esc}'].c['${cesc}']>0){S.an['${esc}'].c['${cesc}']--;save();render()}">−</button><div class="qv">${q}</div><button class="qb" onclick="S.an['${esc}'].c['${cesc}']++;save();render()">+</button></div></div>`;
          });
        });
        h+=`</div>`;
      }
      h+=`</div>`;
    });
  }

  if(S.tab==="evolved"){
    h+=`<div class="evoInfo">Evolved animals are unlocked via the Sun Caves ice statues (offer 5 Best Quality produce). Breed via "Breed with traits" — color inherits from parent species.</div>`;
    EVA.forEach(ev=>{const u=S.ev[ev.s]?.u,n=S.ev[ev.s]?.n||0;
      h+=`<div class="ecard"><span style="font-size:1.4rem">${ev.e}</span><div style="flex:1"><div class="ename">${ev.s}</div><div class="efrom">From ${ev.f}</div></div>`;
      h+=`<button class="etog${u?" on":""}" onclick="S.ev['${ev.s}'].u=!S.ev['${ev.s}'].u;save();render()">${u?"✓ Unlocked":"🔒 Locked"}</button>`;
      h+=`<div class="qc"><button class="qb${n<=0?" off":""}" onclick="if(S.ev['${ev.s}'].n>0){S.ev['${ev.s}'].n--;save();render()}">−</button><div class="qv">${n}</div><button class="qb" onclick="S.ev['${ev.s}'].n++;save();render()">+</button></div></div>`;
    });
  }

  if(S.tab==="charts"){
    h+=`<div style="text-align:center;margin-bottom:6px"><div class="secLbl">Animals on Farm <span class="ln"></span></div></div>`;
    h+=`<div class="pieWrap">${makePie(farmBySpecies.filter(d=>d.v>0),200,50)}`;
    h+=`<div class="pieLegend">${farmBySpecies.map(d=>`<span class="pieLI" onclick="showSpeciesPie(${d.i})"><span class="dot" style="background:${d.c}"></span>${d.e} ${d.n}: ${d.v}</span>`).join("")}</div></div>`;
    h+=`<div style="font-size:.6rem;color:var(--t3);text-align:center;margin-top:4px">Click a species to see its color breakdown</div>`;
    h+=`<div class="secLbl" style="margin-top:16px">Per-Species Color Charts <span class="ln"></span></div>`;
    h+=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px">`;
    AD.forEach((a,i)=>{
      const sa=S.an[a.s];const data=a.c.filter(c=>sa.c[c.n]>0).map(c=>({v:sa.c[c.n],c:COLORS_MAP[c.n]||"#888",n:c.n}));
      h+=`<div style="background:var(--b2);border:1px solid var(--bd);border-radius:10px;padding:10px;text-align:center;cursor:pointer" onclick="showSpeciesPie(${i})">`;
      h+=`<div style="font-size:.7rem;font-weight:600;margin-bottom:6px">${a.e} ${a.s}</div>`;
      h+=makePie(data,100,25);
      h+=`</div>`;
    });
    h+=`</div>`;
  }

  if(S.tab==="summary"){
    h+=`<div class="obar"><div class="obarTop"><span>Color Collection</span><span>${totC}/${totP} (${oP}%)</span></div><div class="obarBg"><div class="obarFill" style="width:${oP}%"></div></div></div>`;
    h+=`<div class="sgrid"><div class="s2"><div class="s2v">${totF}</div><div class="s2l">On Farm</div></div><div class="s2"><div class="s2v">${totF}/${mx}</div><div class="s2l">Capacity</div></div><div class="s2"><div class="s2v">${spD}/${AD.length}</div><div class="s2l">Complete</div></div><div class="s2"><div class="s2v">${EVA.filter(e=>S.ev[e.s]?.u).length}/${EVA.length}</div><div class="s2l">Evolved</div></div></div>`;
    h+=`<div class="secLbl">Per Species <span class="ln"></span></div>`;
    AD.forEach(a=>{const sa=S.an[a.s],fc=Object.values(sa.c).reduce((x,v)=>x+v,0),cc=a.c.filter(c=>sa.c[c.n]>0).length,tt=a.c.length,p=Math.round(cc/tt*100);
      h+=`<div class="sumRow"><span>${a.e} ${a.s}</span><span class="sumRight"><span style="color:var(--t3)">${fc} farm</span><span>${cc}/${tt}</span><span class="pbBg" style="width:45px"><span class="pbFill" style="width:${p}%;background:${p===100?"var(--g)":"var(--ac)"}"></span></span><span style="font-weight:700;width:28px;text-align:right">${p}%</span></span></div>`});

    // Export/Import
    h+=`<div class="syncArea" style="margin-top:16px"><label>📱 Sync Between Devices</label>`;
    h+=`<div style="display:flex;gap:6px;margin-top:8px"><button class="syncBtn" onclick="document.getElementById('syncBox').value=btoa(JSON.stringify(S));document.getElementById('syncBox').select();document.execCommand('copy');this.textContent='Copied!'">Export</button>`;
    h+=`<button class="syncBtn" onclick="try{var d=JSON.parse(atob(document.getElementById('syncBox').value.trim()));Object.assign(S,d);save();render();alert('Imported!')}catch(e){alert('Invalid data')}">Import</button></div>`;
    h+=`<textarea id="syncBox" placeholder="Export copies your data here. To import on another device, paste the code and click Import."></textarea></div>`;

    h+=`<div class="resetArea"><button class="resetBtn" onclick="if(confirm('Reset all data to original spreadsheet values?')){S=mkDef();save();render()}">Reset to Original Data</button></div>`;
  }
  document.getElementById("app").innerHTML=h;
}
render();
</script>
</body>
</html>
